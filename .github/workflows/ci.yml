name: CI — Agregado.Pro

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─── Typecheck ─────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript strict check
        run: pnpm typecheck

  # ─── Lint ──────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # ─── Unit + Integration Tests ─────────────────────────────────
  test:
    name: Tests (unit + integration)
    runs-on: ubuntu-latest
    env:
      # Variáveis mínimas para Jest rodar sem conexão real
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # Cobertura mínima 80% (definida no jest.config.ts)
      - name: Check coverage thresholds
        run: echo "Coverage check already enforced by jest.config.ts thresholds"

  # ─── Security: Secret Scanning ────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Dependency Vulnerability Scan ────────────────────────────
  dep-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true  # Alertar mas não bloquear por high (revisar manualmente)

  # ─── Migration Validation ─────────────────────────────────────
  migration-check:
    name: Migration Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify migration file naming convention
        run: |
          echo "Checking migration naming convention (YYYYMMDD_description.sql)..."
          for file in supabase/migrations/*.sql; do
            basename=$(basename "$file")
            if ! echo "$basename" | grep -qE '^[0-9]{8}_[a-z_]+\.sql$'; then
              echo "❌ Invalid migration filename: $basename"
              echo "Expected format: YYYYMMDD_description.sql"
              exit 1
            fi
          done
          echo "✅ All migrations follow naming convention"

      - name: Verify RLS in all table migrations
        run: |
          echo "Checking RLS in migration files..."
          violations=0
          for file in supabase/migrations/*.sql; do
            if grep -q "CREATE TABLE" "$file"; then
              if ! grep -q "ROW LEVEL SECURITY" "$file"; then
                echo "⚠️  Migration may be missing RLS: $(basename $file)"
                violations=$((violations+1))
              fi
            fi
          done
          if [ $violations -gt 0 ]; then
            echo "⚠️  $violations migrations may be missing RLS — review manually"
          else
            echo "✅ RLS present in all table migrations"
          fi

  # ─── Build Check ──────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: placeholder_secret_for_build_only_32_chars_minimum
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build output missing"
            exit 1
          fi
          echo "✅ Build successful"

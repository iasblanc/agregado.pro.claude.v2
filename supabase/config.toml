# Supabase Local Development Config — Agregado.Pro
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled  = true
port     = 54321
schemas  = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port    = 54323

[inbucket]
enabled = true
port    = 54324

[storage]
enabled      = true
file_size_limit = "50MiB"

[auth]
enabled         = true
site_url        = "http://localhost:3000"
jwt_expiry      = 3600
enable_signup   = true
# URLs de redirecionamento permitidas
additional_redirect_urls = [
  "http://localhost:3000/api/auth/callback",
  "https://*.vercel.app/api/auth/callback",
]

[auth.email]
enable_signup    = true
double_confirm_changes = true
enable_confirmations = false  # false em dev — true em produção

[auth.sms]
enable_signup        = false
enable_confirmations = false

[functions]
# Edge Functions locais
verify_jwt = false  # desabilitado em dev

[analytics]
enabled = false
